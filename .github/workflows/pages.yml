name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Cache-bust 3D viewer assets
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          sha = "${{ github.sha }}"
          path = Path("3d/index.html")
          html = path.read_text()
          html = html.replace('href="./index.css"', f'href="./index.css?v={sha}"')
          html = html.replace('src="./index.js"', f'src="./index.js?v={sha}"')
          path.write_text(html)
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
